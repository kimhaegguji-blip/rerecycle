<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>간단한 2D 사격 게임</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #78B159;
            border: 4px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .ui-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        #target {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #FF4B4B;
            border: 10px double white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #screen-title {
            color: white;
            font-size: 32px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #FFCC00;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #cc9900;
            -webkit-tap-highlight-color: transparent;
        }

        #start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #cc9900;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="score-display" class="ui-text">점수: 0</div>
            <div id="time-display" class="ui-text">남은 시간: 30s</div>
        </div>

        <div id="target"></div>

        <div id="screen-overlay">
            <div id="screen-title">사격 게임<br><span style="font-size: 16px; color: #ccc;">30초 동안 과녁을 터치하세요!</span></div>
            <button id="start-btn">게임 시작</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score-display');
        const timeDisplay = document.getElementById('time-display');
        const screenOverlay = document.getElementById('screen-overlay');
        const screenTitle = document.getElementById('screen-title');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let timeLeft = 30;
        let gameInterval = null;
        let targetInterval = null;
        let isPlaying = false;

        // [수정] 게임 시작 로직 안정화
        function startGame() {
            score = 0;
            timeLeft = 30;
            isPlaying = true;
            
            scoreDisplay.textContent = `점수: ${score}`;
            timeDisplay.textContent = `남은 시간: ${timeLeft}s`;
            
            // 화면 숨기기
            screenOverlay.style.display = 'none';
            target.style.display = 'block';
            
            // 기존 인터벌이 혹시 남아있다면 제거 (중복 실행 방지)
            clearInterval(gameInterval);
            clearInterval(targetInterval);
            
            // 즉시 첫 과녁 배치 후 타이머 구동
            moveTarget();
            gameInterval = setInterval(updateTimer, 1000);
            targetInterval = setInterval(moveTarget, 1500);
        }

        function updateTimer() {
            timeLeft--;
            timeDisplay.textContent = `남은 시간: ${timeLeft}s`;
            if (timeLeft <= 0) {
                endGame();
            }
        }

        // [수정] 크기가 0으로 잡히는 버그 방어 코드 추가
        function moveTarget() {
            if (!isPlaying) return;

            let width = gameContainer.clientWidth;
            let height = gameContainer.clientHeight;
            
            // 만약 브라우저 로딩 문제로 크기가 0이라면 기본값 부여
            if (width === 0) width = window.innerWidth;
            if (height === 0) height = window.innerHeight;

            const padding = 50; 
            
            // 안전하게 % 비율로 계산하여 배치
            const randomX = Math.random() * (90 - 10) + 10; // 10% ~ 90% 사이
            const randomY = Math.random() * (85 - 15) + 15; // 15% ~ 85% 사이

            target.style.left = `${randomX}%`;
            target.style.top = `${randomY}%`;
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(targetInterval);
            target.style.display = 'none';
            
            screenTitle.innerHTML = `게임 오버!<br><span style="color: #FFCC00; font-size: 36px;">최종 점수: ${score}점</span>`;
            startBtn.textContent = '다시 시작';
            screenOverlay.style.display = 'flex';
        }

        // 과녁 맞췄을 때의 로직 (모바일/PC 공용)
        function hitTarget(e) {
            if (!isPlaying) return;
            
            // 이벤트 전파 및 기본 동작 차단
            if(e) {
                e.stopPropagation();
                if(e.cancelable) e.preventDefault();
            }

            score += 10;
            scoreDisplay.textContent = `점수: ${score`;
            
            clearInterval(targetInterval);
            moveTarget();
            targetInterval = setInterval(moveTarget, 1500);
        }

        // 이벤트 리스너 통합 및 최적화
        target.addEventListener('pointerdown', hitTarget);

        // [오류 해결] 시작 버튼은 가장 직관적이고 표준적인 'click' 이벤트로 통일
        // 모바일 브라우저도 'click' 이벤트를 알아서 터치로 매핑해주므로 이것이 가장 안전합니다.
        startBtn.addEventListener('click', function(e) {
            startGame();
        });
    </script>
</body>
</html>
